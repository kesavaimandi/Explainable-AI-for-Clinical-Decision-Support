<!DOCTYPE html>
<html>
<head>
    <title>Medical XAI System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="app-body">

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <a href="/heart">
            <button><span>Heart</span></button>
        </a>

        <a href="/diabetes">
            <button class="active"><span>Diabetes</span></button>
        </a>

        <a href="/breast_cancer">
            <button><span>Breast Cancer</span></button>
        </a>
    </div>

    <!-- Main Content -->
    <div class="main">

        <div class="header">
            <h1>Diabetes Risk Prediction</h1>
            <p>AI-powered Clinical Decision Support with Explainable AI</p>
        </div>

        <div class="card">
            <form action="/predict_diabetes" method="post">

                <div class="form-grid">

                    <!-- 1 -->
                    <div>
                        <label>Pregnancies</label>
                        <input type="number" name="Pregnancies" required>
                    </div>

                    <!-- 2 -->
                    <div>
                        <label>Glucose</label>
                        <input type="number" name="Glucose" required>
                    </div>

                    <!-- 3 -->
                    <div>
                        <label>Blood Pressure</label>
                        <input type="number" name="BloodPressure" required>
                    </div>

                    <!-- 4 -->
                    <div>
                        <label>Skin Thickness</label>
                        <input type="number" name="SkinThickness" required>
                    </div>

                    <!-- 5 -->
                    <div>
                        <label>Insulin</label>
                        <input type="number" name="Insulin" required>
                    </div>

                    <!-- 6 -->
                    <div>
                        <label>BMI</label>
                        <input type="number" step="0.1" name="BMI" required>
                    </div>

                    <!-- 7 -->
                    <div>
                        <label>Diabetes Pedigree Function</label>
                        <input type="number" step="0.01" name="DiabetesPedigreeFunction" required>
                    </div>

                    <!-- 8 -->
                    <div>
                        <label>Age</label>
                        <input type="number" name="Age" required>
                    </div>

                </div>

                <button class="submit-btn">Predict with XAI</button>

            </form>
        </div>

    </div>
</div>

</body>
</html>
